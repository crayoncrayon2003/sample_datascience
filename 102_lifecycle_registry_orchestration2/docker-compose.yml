# =============================================================================
# 102_lifecycle_registry_orchestration2 - モデルライフサイクル(MLflow + Airflow)
#
#   ストリーミング基盤(Kafka 直読 → Spark Structured Streaming → ClickHouse → Grafana)
#   の上に、モデルの「管理・配信・再学習」を載せた構成:
#
#     - MLflow Tracking + Model Registry … 実験記録と version 管理(alias 方式)
#     - Trainer  … 学習 → run 記録 → version 登録 → @challenger 付与
#     - Promoter … champion と ROC-AUC 比較 → 勝てば @champion 昇格(ロールバック可)
#     - Airflow  … 上記を DAG 化しスケジュール実行(features → challenger → champion)
#     - Scorer   … models:/fraud@champion を Registry から解決し無停止リロード
#
# 起動の流れ:
#   make up        … 基盤 + mlflow + airflow + stream-scorer + Grafana を起動
#   make connector … CDC 開始
#   make clients   … ペルソナ別クライアントを起動(データ投入)
#   make train     … 前処理 → 学習(@challenger)→ 昇格(@champion)を一括実行
#   → http://localhost:5000 (MLflow) / :8080 (Airflow) / :3000 (Grafana)
# =============================================================================

name: lifecycle_registry_orchestration2

services:
  # --------------------------------------------------------------------------
  # 入口: ペルソナ別クライアント(同一イメージ・env で挙動を変える)
  # --------------------------------------------------------------------------
  client-jp:
    build: ./00_clients
    profiles: ["clients"]
    environment: { SOURCE: client-jp, REGION: jp, RATE: "3.0", FRAUD_BIAS: "0.0", INGEST_URL: "http://ingest-api:8000" }
    depends_on: { ingest-api: { condition: service_started } }
    restart: unless-stopped

  client-eu:
    build: ./00_clients
    profiles: ["clients"]
    environment: { SOURCE: client-eu, REGION: eu, RATE: "1.5", FRAUD_BIAS: "0.05", INGEST_URL: "http://ingest-api:8000" }
    depends_on: { ingest-api: { condition: service_started } }
    restart: unless-stopped

  client-us:
    build: ./00_clients
    profiles: ["clients"]
    environment: { SOURCE: client-us, REGION: us, RATE: "2.0", FRAUD_BIAS: "0.05", INGEST_URL: "http://ingest-api:8000" }
    depends_on: { ingest-api: { condition: service_started } }
    restart: unless-stopped

  client-fraud:
    build: ./00_clients
    profiles: ["clients"]
    environment: { SOURCE: client-fraud, REGION: fraud, RATE: "0.5", FRAUD_BIAS: "0.5", INGEST_URL: "http://ingest-api:8000" }
    depends_on: { ingest-api: { condition: service_started } }
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Ingest API
  # --------------------------------------------------------------------------
  ingest-api:
    build: ./01_api_ingest
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/oltp
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # PostgreSQL (OLTP + MLflow バックエンドストア)
  #   init/00_mlflow_db.sql が mlflow DB を作成、01_schema.sql が OLTP スキーマを作成。
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_wal_senders=10", "-c", "max_replication_slots=10"]
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: oltp
    ports:
      - "5432:5432"
    volumes:
      - ./02_postgres/init:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d oltp"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------------
  # MLflow Tracking Server + Model Registry
  # --------------------------------------------------------------------------
  mlflow:
    build: ./06_mlflow
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://app:app@postgres:5432/mlflow
      MLFLOW_ARTIFACTS_DESTINATION: /mlflow/artifacts
    volumes:
      - mlflowartifacts:/mlflow/artifacts
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Kafka + Zookeeper
  # --------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10

  # --------------------------------------------------------------------------
  # Debezium / Kafka Connect
  # --------------------------------------------------------------------------
  connect:
    image: quay.io/debezium/connect:2.7
    depends_on:
      kafka: { condition: service_healthy }
      postgres: { condition: service_healthy }
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: cdc-connect
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  # --------------------------------------------------------------------------
  # ClickHouse (Sink + DWH)
  # --------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    depends_on:
      kafka: { condition: service_healthy }
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes:
      - ./04_clickhouse/init:/docker-entrypoint-initdb.d:ro
      - ./04_clickhouse/users.d/open-default-network.xml:/etc/clickhouse-server/users.d/open-default-network.xml:ro
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------------
  # 学習バッチ(Airflow から docker compose run で起動される。手動なら make train)
  #   spark    : ClickHouse → 特徴量 parquet(features ボリューム)
  #   trainer  : 学習 → MLflow 登録 → @challenger
  #   promoter : champion と比較し勝てば @champion 昇格(同 image / command 差し替え)
  # --------------------------------------------------------------------------
  spark:
    build: ./05_spark
    profiles: ["batch"]
    depends_on:
      clickhouse: { condition: service_healthy }
    environment:
      CLICKHOUSE_URL: jdbc:clickhouse://clickhouse:8123/dwh
    volumes:
      - features:/data/features

  trainer:
    build: ./07_trainer
    profiles: ["batch"]
    depends_on:
      mlflow: { condition: service_started }
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_NAME: fraud
    volumes:
      - features:/data/features

  promoter:
    build: ./07_trainer
    profiles: ["batch"]
    command: ["python", "promote.py"]
    depends_on:
      mlflow: { condition: service_started }
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_NAME: fraud
      PROMOTE_ON_TIE: "true"

  # --------------------------------------------------------------------------
  # オーケストレータ: Airflow(features → challenger_model → champion_model)
  #   計算は持たず docker compose run で上記バッチを起動する指揮者。
  #   そのため docker socket と compose 一式(/project)をマウントする。
  #   DAG(dags/retrain.py)が cd /project して docker compose run するので working_dir 不要。
  #   standalone が SQLite + webserver(:8080) + scheduler を一括起動する。
  # --------------------------------------------------------------------------
  airflow:
    build: ./08_orchestrator
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/project
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # 出口: Spark Structured Streaming = Kafka 直読でリアルタイム推論
  #   models:/fraud@champion を MLflow Registry から解決し、champion 切替を無停止反映。
  # --------------------------------------------------------------------------
  stream-scorer:
    build: ./09_stream_scorer
    depends_on:
      kafka: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
      mlflow: { condition: service_started }
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: oltp.public.transactions
      CLICKHOUSE_HOST: clickhouse
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_NAME: fraud
      MODEL_ALIAS: champion
      CHECKPOINT: /data/checkpoint
      TRIGGER: "5 seconds"
      STARTING_OFFSETS: earliest
    volumes:
      - sscheckpoint:/data/checkpoint
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # 出口: Grafana(時系列 + 地図ダッシュボード)
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.0
    depends_on:
      clickhouse: { condition: service_healthy }
    ports:
      - "3000:3000"
    environment:
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./10_grafana/provisioning:/etc/grafana/provisioning:ro
      - ./10_grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
  chdata:
  features:
  grafana:
  sscheckpoint:
  mlflowartifacts:
