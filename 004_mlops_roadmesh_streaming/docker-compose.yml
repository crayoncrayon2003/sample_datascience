# =============================================================================
# 004_mlops_roadmesh_streaming - 道路網エージェント + 道路リンク渋滞予測 + 地図
#
#   [prep] osmnx で滋賀の道路グラフ(graphml)を取得(make data / 別途)
#   道路網エージェント(00_feeds, ランダムウォーク)
#     → Ingest API → PostgreSQL(OLTP) --WAL--> Debezium → Kafka
#     → ClickHouse(DWH, 車両位置を Kafka Engine が取り込み)
#     → Spark 前処理 → Trainer 学習(道路リンク渋滞3クラス分類)→ Model
#     → Spark Structured Streaming(Kafka を直読して道路リンク渋滞をリアルタイム予測)
#     → Grafana 地図で可視化(車両を予測渋滞で色分け)
#
# Kafka 直読 → Structured Streaming のストリーミング基盤の上で、入口を実道路網
# (OSM/osmnx)の上を走る agent-based シミュレーションにしたもの。渋滞予測の単位は道路リンク。
#
# 起動の流れ:
#   make data      … (1回) osmnx で大津市・草津市 graphml を取得
#   make up        … 基盤 + stream-scorer + Grafana を起動
#   make connector … CDC 開始
#   make feeds     … 道路網エージェントを起動(車両位置の投入)
#   make train     … 前処理 + 学習(batch)
# =============================================================================

name: mlops_roadmesh_streaming

services:
  # --------------------------------------------------------------------------
  # prep: osmnx で道路グラフを取得して /data/road に保存(重いので1回だけ・profile分離)
  # --------------------------------------------------------------------------
  prep:
    build: ./prep
    profiles: ["prep"]
    volumes:
      - ./data:/data
      - ./08_grafana/geojson:/data/geojson

  # --------------------------------------------------------------------------
  # 入口(ライブ・可視化用): 道路網エージェントが実時間で走行し位置を流す
  #   profile "feeds"。時刻は実時刻(偽の加速 TIME_SCALE は廃止)。MOVE_SCALE は再生速度のみ。
  # --------------------------------------------------------------------------
  feeds:
    build: ./00_feeds
    profiles: ["feeds"]
    environment:
      GRAPHML: ${GRAPHML:-}
      INGEST_URL: ${INGEST_URL:-http://ingest-api:8000}
      TZ: ${TZ:-Asia/Tokyo}
      AGENTS: ${AGENTS:-200}
      TICK: ${TICK:-1.0}
      MOVE_SCALE: ${MOVE_SCALE:-8}
      BATCH_POST: ${BATCH_POST:-1}
      AVOID_UTURN: ${AVOID_UTURN:-1}
      ADD_REVERSE_EDGES: ${ADD_REVERSE_EDGES:-0}
      RANDOM_SEED: ${RANDOM_SEED:-}
      # Grafana の初期表示(大津付近)に車両を出しやすくする。合わない道路データでは全域へ自動フォールバック。
      SPAWN_BBOX: ${SPAWN_BBOX:-34.95,135.80,35.10,135.95}
    volumes:
      - ./data/road:/data/road:ro
    depends_on: { ingest-api: { condition: service_started } }
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Ingest API
  # --------------------------------------------------------------------------
  ingest-api:
    build: ./01_api_ingest
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/oltp
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # PostgreSQL (OLTP)
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_wal_senders=10", "-c", "max_replication_slots=10"]
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: oltp
    ports:
      - "5432:5432"
    volumes:
      - ./02_postgres/init:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d oltp"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------------
  # Kafka + Zookeeper
  # --------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10

  # --------------------------------------------------------------------------
  # Debezium / Kafka Connect
  # --------------------------------------------------------------------------
  connect:
    image: quay.io/debezium/connect:2.7
    depends_on:
      kafka: { condition: service_healthy }
      postgres: { condition: service_healthy }
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: cdc-connect
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/ || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12

  # --------------------------------------------------------------------------
  # ClickHouse (Sink + DWH)
  # --------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    depends_on:
      kafka: { condition: service_healthy }
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes:
      - ./04_clickhouse/init:/docker-entrypoint-initdb.d:ro
      - ./04_clickhouse/users.d/open-default-network.xml:/etc/clickhouse-server/users.d/open-default-network.xml:ro
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------------
  # Spark 前処理 / Trainer 学習 (batch)
  # --------------------------------------------------------------------------
  spark:
    build: ./05_spark
    profiles: ["batch"]
    depends_on:
      clickhouse: { condition: service_healthy }
    environment:
      CLICKHOUSE_URL: jdbc:clickhouse://clickhouse:8123/dwh
    volumes:
      - features:/data/features

  trainer:
    build: ./06_trainer
    profiles: ["batch"]
    volumes:
      - features:/data/features
      - models:/models

  # --------------------------------------------------------------------------
  # linkgeo: graphml からリンクの中点・進行方位を計算し dwh.link_geo へ投入(一発)
  #   矢印1本/リンク表示の固定座標を作る。make data + ClickHouse 起動後に make linkgeo。
  # --------------------------------------------------------------------------
  linkgeo:
    build: ./09_linkgeo
    profiles: ["linkgeo"]
    depends_on:
      clickhouse: { condition: service_healthy }
    environment:
      GRAPHML: ${GRAPHML:-/data/road/road_drive.graphml}
      CLICKHOUSE_HOST: clickhouse
    volumes:
      - ./data/road:/data/road:ro

  # --------------------------------------------------------------------------
  # 出口の前提: Spark Structured Streaming = Kafka を直読してリアルタイム推論
  #   最新モデルで新着をスコアし dwh.predictions へ連続 append する常駐ジョブ。
  # --------------------------------------------------------------------------
  stream-scorer:
    build: ./07_stream_scorer
    depends_on:
      kafka: { condition: service_healthy }
      clickhouse: { condition: service_healthy }
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: oltp.public.vehicle_positions
      CLICKHOUSE_HOST: clickhouse
      MODEL_PATH: /models/model.joblib
      META_PATH: /models/metadata.json
      CHECKPOINT: /data/checkpoint
      TRIGGER: "5 seconds"
      STARTING_OFFSETS: earliest
    volumes:
      - models:/models:ro
      - sscheckpoint:/data/checkpoint
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # 出口: Grafana(時系列 + 地図ダッシュボード)
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.0
    depends_on:
      clickhouse: { condition: service_healthy }
    ports:
      - "3000:3000"
    environment:
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./08_grafana/provisioning:/etc/grafana/provisioning:ro
      - ./08_grafana/dashboards:/var/lib/grafana/dashboards:ro
      # 県境界などの GeoJSON を Grafana の公開ディレクトリに置き、geomap の GeoJSON レイヤから読む
      # (prep が boundary.geojson を生成。無くても車両レイヤは独立に動く)
      - ./08_grafana/geojson:/usr/share/grafana/public/maps/sample:ro
      - grafana:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
  chdata:
  features:
  models:
  grafana:
  sscheckpoint:
